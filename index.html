        /* --- CORE STYLES & VARIABLES --- */
        :root {
            /* User Provided Color Palette */
            --c-onyx: #0a090c;
            --c-platinum: #f0edee;
            --c-dark-teal: #07393c;
            --c-stormy-teal: #2c666e;
            --c-frosted-blue: #90ddf0;

            /* Applied Application Colors */
            --bg-color: #ffffff; 
            --sidebar-bg: var(--c-platinum); 
            
            /* Neurons */
            --neuron-bg: var(--c-frosted-blue); 
            --neuron-active: var(--c-stormy-teal); 
            
            /* Text */
            --neuron-text: var(--c-onyx); 
            --neuron-text-light: #ffffff;
            
            /* Lines and Labels */
            --connection-color: var(--c-onyx); 
            --label-text: var(--c-dark-teal); 
            
            /* Component Borders */
            --border-dark: var(--c-onyx);

            /* Typography System */
            --font-main: 'Cascadia Code', Consolas, Monaco, 'Lucida Console', monospace;
            --font-header: 'Impact', fantasy, sans-serif;

            --neuron-height: 48px;
            --neuron-padding: 0 24px;
            --neuron-radius: 24px; 
            --gap-y: 140px; 
            --gap-x: 20px; 

            --modal-backdrop: rgba(10, 9, 12, 0.7); 
            --modal-content-bg: #ffffff;
            
            --sidebar-width: 18%;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--neuron-text);
            font-family: var(--font-main); 
            overflow-x: hidden; 
        }

        /* --- LAYOUT CONTAINERS --- */
        .layout-container {
            display: flex;
            width: 100vw;
            min-height: 100vh;
        }

        /* Left Column */
        .sidebar {
            width: var(--sidebar-width);
            min-width: 230px; 
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--sidebar-bg); 
            border-right: 3px solid var(--border-dark);
            padding: 40px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 25px; 
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-main-title {
            font-family: var(--font-header); 
            font-size: 24.2px; /* DECREASED 1px: 25.2px -> 24.2px */
            font-weight: normal; 
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--c-dark-teal);
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 3px solid var(--border-dark);
            margin-bottom: 5px;
        }

        /* Right Column */
        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            padding-bottom: 120px; 
            position: relative;
            z-index: 1; 
            overflow-x: auto;
        }

        /* --- SIDEBAR CARDS --- */
        .sidebar-card {
            background: #ffffff;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--border-dark);
            box-shadow: 4px 4px 0px rgba(10, 9, 12, 0.1); 
            font-size: 13.2px; /* DECREASED 1px: 14.2px -> 13.2px */
        }

        .card-title {
            font-family: var(--font-header); 
            font-size: 16.2px; /* DECREASED 1px: 17.2px -> 16.2px */
            font-weight: normal;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
            color: var(--c-dark-teal);
            border-bottom: 2px solid var(--c-onyx);
            padding-bottom: 8px;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
            color: var(--neuron-text);
        }
        .contact-item strong {
            color: var(--c-stormy-teal);
            margin-right: 8px;
        }
        .contact-item { word-break: break-word; }

        .important-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .link-btn {
            background-color: var(--c-platinum);
            border: 2px solid var(--border-dark);
            color: var(--neuron-text);
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 12.2px; /* DECREASED 1px: 13.2px -> 12.2px */
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
            font-family: var(--font-main);
        }
        .link-btn:hover {
            background-color: var(--c-stormy-teal);
            color: var(--neuron-text-light);
            transform: translateY(-2px);
            box-shadow: 2px 2px 0px var(--c-onyx);
        }

        .network-legend { color: var(--neuron-text); }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-size: 12.2px; /* DECREASED 1px: 13.2px -> 12.2px */
            font-weight: bold;
        }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-color {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            margin-right: 12px;
            border: 2px solid var(--border-dark);
            flex-shrink: 0; 
        }

        .legend-color.box-input { background-color: var(--c-platinum); }
        .legend-color.box-ed-skill { background-color: var(--c-frosted-blue); }
        .legend-color.box-project { background-color: var(--c-stormy-teal); }
        .legend-color.box-work { background-color: var(--c-dark-teal); }
        .legend-color.box-output { background-color: var(--c-onyx); }

        /* --- MAIN ARCHITECTURE CONTENT --- */
        .profile-name {
            font-family: var(--font-header); 
            background-color: var(--c-dark-teal);
            color: var(--neuron-text-light);
            padding: 10px 40px;
            font-size: 34px; 
            font-weight: normal;
            border-radius: 8px;
            letter-spacing: 2px;
            border: 2px solid var(--border-dark);
            box-shadow: 4px 4px 0px rgba(10, 9, 12, 0.15);
            margin-bottom: 15px; 
            z-index: 30; 
            text-transform: uppercase;
        }

        .architecture-wrapper {
            position: relative;
            padding: 20px 0 60px 0; 
            z-index: 5; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            transform: scale(0.85);
            transform-origin: top center;
            margin: 0 auto;
        }

        /* --- LAYER BOXES --- */
        .layer {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: var(--gap-x);
            margin-bottom: var(--gap-y);
            position: relative;
            min-height: calc(var(--neuron-height) + 20px);
            z-index: 10; 
            transition: all 0.3s ease;
            box-sizing: border-box; 
        }
        .layer:last-child { margin-bottom: 0; }

        .layer-box {
            border: 3px dashed var(--border-dark);
            border-radius: 12px;
            padding: 20px;
        }

        .box-input { background-color: rgba(240, 237, 238, 0.9); } 
        .box-ed-skill { background-color: rgba(144, 221, 240, 0.25); } 
        .box-project { background-color: rgba(44, 102, 110, 0.2); } 
        .box-work { background-color: rgba(7, 57, 60, 0.15); } 
        .box-output { background-color: rgba(10, 9, 12, 0.1); } 

        .layer[data-layer-id="layer-2"] { min-width: 900px; }
        .layer[data-layer-id="layer-3"] { min-width: 700px; }
        .layer[data-layer-id="layer-4"] { min-width: 500px; }
        .layer[data-layer-id="layer-5"] { min-width: 300px; }

        /* --- NEURONS --- */
        .neuron {
            background-color: var(--neuron-bg);
            height: var(--neuron-height);
            border-radius: var(--neuron-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--neuron-padding);
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            border: 2px solid var(--border-dark);
            box-sizing: border-box;
            position: relative;
            z-index: 30; 
            white-space: nowrap; 
        }

        .neuron:hover {
            background-color: var(--neuron-active);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 4px 6px 0px rgba(10, 9, 12, 0.2);
            color: var(--neuron-text-light);
        }

        .neuron-label {
            font-size: 16px; 
            font-weight: bold;
            text-transform: uppercase;
            font-family: var(--font-main); 
            letter-spacing: 0.5px;
            pointer-events: none; 
        }

        .input-code {
            color: var(--c-dark-teal);
            margin-right: 6px;
        }

        [data-layer-id="layer-5"] .neuron {
            background-color: var(--c-dark-teal);
            color: var(--neuron-text-light);
        }

        [data-layer-id="layer-5"] .neuron:hover {
            background-color: var(--c-stormy-teal);
            transform: translateY(-3px) scale(1.05);
        }

        /* --- LINES (SVG) --- */
        #connection-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 20; 
        }

        path.connection-line {
            fill: none;
            stroke: var(--connection-color);
            stroke-width: 1.5px; 
            transition: stroke 0.3s ease;
        }

        path.connection-line[marker-end] { marker-end: url(#arrowhead); }

        /* --- MODAL DIALOG --- */
        #details-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--modal-backdrop); 
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000; 
        }

        #details-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--modal-content-bg);
            border: 3px solid var(--border-dark);
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 8px 8px 0px rgba(10, 9, 12, 0.2); 
            position: relative;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            overflow-y: auto;
            line-height: 1.6; 
            font-size: 18px; 
        }

        #details-modal.open .modal-content { transform: translateY(0); }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 30px; 
            font-weight: bold;
            cursor: pointer;
            color: var(--c-onyx);
            background: none;
            border: none;
            line-height: 1;
        }

        .close-modal:hover { color: var(--c-stormy-teal); }

        .modal-body h2 {
            font-family: var(--font-header); 
            margin-top: 0;
            color: var(--c-dark-teal);
            text-transform: uppercase;
            font-size: 34px; 
            font-weight: normal;
            letter-spacing: 2px;
            border-bottom: 3px solid var(--c-onyx);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .modal-body h3 {
            font-family: var(--font-header); 
            color: var(--c-stormy-teal);
            font-size: 24px; 
            font-weight: normal;
            letter-spacing: 1px;
            margin-top: 25px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        
        .modal-body p { margin-bottom: 15px; }
        
        .modal-body ul {
            padding-left: 20px;
            margin-bottom: 15px;
        }
        
        .modal-body li { margin-bottom: 8px; }

        .modal-placeholder {
            color: var(--label-text-dark);
            font-style: italic;
            border-left: 3px solid var(--c-onyx);
            padding-left: 15px;
            margin: 20px 0;
        }
    </style>
</head>

    const arcWrapper = document.querySelector(".architecture-wrapper");
    const svgLayer = document.getElementById("connection-svg");
    const modal = document.getElementById("details-modal");
    const modalTitle = document.getElementById("modal-title");
    const closeModalBtn = document.querySelector(".close-modal");

    document.addEventListener("DOMContentLoaded", () => {
        renderLayers();
        setTimeout(drawConnections, 50); 
        window.addEventListener("resize", drawConnections);
        initModal();
    });

    function renderLayers() {
        networkData.layers.forEach(layer => {
            const layerEl = document.createElement("div");
            layerEl.className = "layer";
            
            if (layer.boxClass) {
                layerEl.classList.add("layer-box");
                layerEl.classList.add(layer.boxClass);
            }
            
            layerEl.id = layer.id;
            layerEl.setAttribute("data-layer-id", layer.id);

            layer.neurons.forEach(neuron => {
                const neuronEl = document.createElement("div");
                neuronEl.className = "neuron";
                neuronEl.id = neuron.id; 
                
                let html = '<span class="neuron-label">';
                if (neuron.code) html += `<span class="input-code">${neuron.code}</span>`;
                html += neuron.label;
                html += '</span>';
                
                neuronEl.innerHTML = html;
                layerEl.appendChild(neuronEl);
            });

            arcWrapper.appendChild(layerEl);
        });
    }

    function drawConnections() {
        const paths = svgLayer.querySelectorAll("path");
        paths.forEach(p => p.remove());

        const layersInOrder = networkData.layers;

        for (let i = 0; i < layersInOrder.length - 1; i++) {
            const currentLayer = layersInOrder[i];
            const nextLayer = layersInOrder[i + 1];

            const currentLayerEl = document.getElementById(currentLayer.id);
            const nextLayerEl = document.getElementById(nextLayer.id);

            if (!currentLayerEl || !nextLayerEl) continue;

            currentLayer.neurons.forEach(fromNeuron => {
                const fromEl = document.getElementById(fromNeuron.id);
                if (!fromEl) return;

                const startX = currentLayerEl.offsetLeft + fromEl.offsetLeft + (fromEl.offsetWidth / 2);
                const startY = currentLayerEl.offsetTop + fromEl.offsetTop + fromEl.offsetHeight;

                nextLayer.neurons.forEach(toNeuron => {
                    const toEl = document.getElementById(toNeuron.id);
                    if (!toEl) return;

                    const endX = nextLayerEl.offsetLeft + toEl.offsetLeft + (toEl.offsetWidth / 2);
                    const endY = nextLayerEl.offsetTop + toEl.offsetTop;

                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", `M ${startX} ${startY} L ${endX} ${endY}`);
                    path.setAttribute("class", "connection-line");
                    path.setAttribute("marker-end", "url(#arrowhead)");
                    svgLayer.appendChild(path);
                });
            });
        }
    }

    function initModal() {
        document.body.addEventListener("click", (e) => {
            const neuronEl = e.target.closest(".neuron");
            if (neuronEl) {
                const neuronId = neuronEl.id;
                let clickedNeuronData = null;

                networkData.layers.forEach(layer => {
                    const found = layer.neurons.find(n => n.id === neuronId);
                    if (found) clickedNeuronData = found;
                });

                if (clickedNeuronData) {
                    modalTitle.innerText = clickedNeuronData.label;
                    const contentDiv = document.getElementById("modal-content-text");
                    
                    if (clickedNeuronData.content) {
                        contentDiv.innerHTML = clickedNeuronData.content;
                    } else {
                        contentDiv.innerHTML = "<p class='modal-placeholder'>Details coming soon...</p>";
                    }
                    
                    modal.classList.add("open");
                }
            }
        });

        closeModalBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal(); 
        });
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape" && modal.classList.contains("open")) closeModal();
        });
    }

    function closeModal() {
        modal.classList.remove("open");
    }

</script>
